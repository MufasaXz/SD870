<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard · ROM Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,700&family=Barlow:wght@400;500&family=Azeret+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/admin.css">
    
    <script>
        if (sessionStorage.getItem('sec_token') !== 'YXV0aG9yaXplZA==') {
            window.location.href = "../index.html";
        }
    </script>
</head>
<body>

<div class="admin-wrap">
    <div class="header">
        <h1>Admin / Dashboard</h1>
        <button class="logout-btn" onclick="terminateSession()">LOGOUT</button>
    </div>

    <div class="panel-grid">
        <div class="card">
            <h2>// CONFIGURE BUILD</h2>
            <form id="generatorForm">
                
                <div class="row-2">
                    <div class="form-group">
                        <label>Target Device</label>
                        <select id="t_device" class="form-control">
                            <option value="pipa">Xiaomi Pad 6 (pipa)</option>
                            <option value="lemonade">OnePlus 9R (lemonade)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="t_category" class="form-control">
                            <option value="rom">ROM</option>
                            <option value="kernel">Kernel</option>
                            <option value="recovery">Recovery</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Build Name</label>
                    <input type="text" id="t_name" class="form-control" placeholder="e.g. DERPFEST or LineageOS" required>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="t_desc" class="form-control" placeholder="e.g. Stable build. Dirty flash supported." required>
                </div>

                <div class="row-2">
                    <div class="form-group">
                        <label>Android / Core Version</label>
                        <input type="text" id="t_version" class="form-control" placeholder="e.g. A15">
                    </div>
                    <div class="form-group">
                        <label>Build Status</label>
                        <select id="t_status" class="form-control">
                            <option value="OFFICIAL">OFFICIAL</option>
                            <option value="UNOFFICIAL">UNOFFICIAL</option>
                        </select>
                    </div>
                </div>

                <div class="row-2">
                    <div class="form-group">
                        <label>Variant</label>
                        <select id="t_variant" class="form-control">
                            <option value="GAPPS">GAPPS</option>
                            <option value="VANILLA">VANILLA</option>
                            <option value="N/A">N/A</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Flash Type</label>
                        <select id="t_flash" class="form-control">
                            <option value="DIRTY ✓">DIRTY ✓</option>
                            <option value="CLEAN ONLY">CLEAN ONLY</option>
                        </select>
                    </div>
                </div>

                <div class="row-2">
                    <div class="form-group">
                        <label>Maintainer</label>
                        <input type="text" id="t_maintainer" class="form-control" placeholder="e.g. Mufasa" value="Mufasa" required>
                    </div>
                    <div class="form-group">
                        <label>Release Date</label>
                        <input type="text" id="t_date" class="form-control" placeholder="e.g. 07 Apr 2026" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Download Link</label>
                    <input type="url" id="t_dl" class="form-control" placeholder="https://..." required>
                </div>

                <div class="form-group">
                    <label>Support / Telegram Link</label>
                    <input type="url" id="t_support" class="form-control" placeholder="https://t.me/...">
                </div>

                <button type="button" class="action-btn" onclick="generateCode()">GENERATE BUILD</button>
            </form>
        </div>

        <div class="card">
            <h2>// OUTPUT CODE</h2>
            <p style="font-size: 0.85rem; color: var(--text-2); margin-top: -15px;">Copy and paste this HTML block into your target device's index.html file.</p>
            <textarea id="outputArea" class="output-box" readonly></textarea>
            <button class="copy-btn" onclick="copyToClipboard()">COPY TO CLIPBOARD</button>
        </div>
    </div>
</div>

<script src="../js/admin.js"></script>
</body>
</html>
